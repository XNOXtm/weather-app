<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <main>
      <div id="container">
        <form action="get" id="search-form">
          <h3>Enter a City Name:</h3>
          <input
            type="text"
            id="search-input"
            placeholder="Enter a city e.g; London"
          />
          <button type="submit" id="submit-btn">Search</button>
        </form>

        <div id="info"></div>
      </div>
    </main>
    <footer><p>© 2026 By XNOXtm</p></footer>
  </body>
</html>
